<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="188" viewBox="0 0 1120 188" role="img" aria-labelledby="title desc">
<title>Gini pondéré du split</title>
<desc>Gini_split = (|D_left|/|D|)Gini(D_left)            + (|D_right|/|D|)Gini(D_right)</desc>
<rect x="0" y="0" width="1120" height="188" rx="14" fill="#f8fbff"/>
<rect x="14" y="14" width="1092" height="160" rx="11" fill="#ffffff" stroke="#b9d4f5" stroke-width="2"/>
<rect x="34" y="32" width="7" height="124" rx="4" fill="#286fb4"/>
<text x="58" y="55" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#24415f">Gini pondéré du split</text>
<text x="58" y="86" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#111827">Gini_split = (|D_left|/|D|)Gini(D_left)</text>
<text x="58" y="116" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#111827">           + (|D_right|/|D|)Gini(D_right)</text>
<text x="58" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#50657a">CART minimise l&#x27;impureté pondérée des enfants.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" role="img">
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
.title { font-size: 24px; font-weight: 700; }
.subtitle { font-size: 14px; fill: #64748b; }
.label { font-size: 13px; fill: #64748b; }
.small { font-size: 12px; fill: #64748b; }
.node { font-size: 13px; font-weight: 650; }
</style>
<rect x="0" y="0" width="720" height="430" fill="#ffffff"/>
<text x="36.0" y="38.0" class="title" text-anchor="start">Confusion matrix</text>
<text x="36.0" y="60.0" class="subtitle" text-anchor="start">The four outcomes of a binary classifier.</text>
<text x="400.0" y="95.0" class="label" text-anchor="middle">Predicted class</text>
<text x="92.0" y="215.0" class="label" text-anchor="middle">Actual class</text>
<text x="295.0" y="100.0" class="label" text-anchor="middle">Positive</text>
<text x="505.0" y="100.0" class="label" text-anchor="middle">Negative</text>
<text x="170.0" y="165.0" class="label" text-anchor="end">Positive</text>
<text x="170.0" y="265.0" class="label" text-anchor="end">Negative</text>
<rect x="190.0" y="115.0" width="210.0" height="100.0" rx="10.0" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="295.0" y="158.0" class="title" text-anchor="middle">TP</text>
<text x="295.0" y="184.0" class="label" text-anchor="middle">True Positive</text>
<rect x="400.0" y="115.0" width="210.0" height="100.0" rx="10.0" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="505.0" y="158.0" class="title" text-anchor="middle">FN</text>
<text x="505.0" y="184.0" class="label" text-anchor="middle">False Negative</text>
<rect x="190.0" y="215.0" width="210.0" height="100.0" rx="10.0" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="295.0" y="258.0" class="title" text-anchor="middle">FP</text>
<text x="295.0" y="284.0" class="label" text-anchor="middle">False Positive</text>
<rect x="400.0" y="215.0" width="210.0" height="100.0" rx="10.0" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="505.0" y="258.0" class="title" text-anchor="middle">TN</text>
<text x="505.0" y="284.0" class="label" text-anchor="middle">True Negative</text>
<text x="480.0" y="357.0" class="small" text-anchor="middle">FP = Type I error</text>
<text x="480.0" y="377.0" class="small" text-anchor="middle">FN = Type II error</text>
</svg>

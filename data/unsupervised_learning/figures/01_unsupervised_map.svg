<svg xmlns="http://www.w3.org/2000/svg" width="820" height="390" viewBox="0 0 820 390" role="img">
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
.title { font-size: 24px; font-weight: 700; }
.subtitle { font-size: 14px; fill: #64748b; }
.label { font-size: 13px; fill: #64748b; }
.small { font-size: 12px; fill: #64748b; }
.node { font-size: 13px; font-weight: 650; }
</style>
<rect x="0" y="0" width="820" height="390" fill="#ffffff"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
</marker>
</defs>
<text x="36.0" y="36.0" class="title" text-anchor="start">Apprentissage non supervisé</text>
<text x="36.0" y="58.0" class="subtitle" text-anchor="start">Pas de label y : le modèle cherche une structure dans X.</text>
<rect x="300.0" y="85.0" width="220.0" height="60.0" rx="10.0" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<text x="410.0" y="121.0" class="node" text-anchor="middle">Données X sans cible</text>
<line x1="410.0" y1="145.0" x2="135.0" y2="230.0" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="45.0" y="230.0" width="180.0" height="88.0" rx="10.0" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="135.0" y="266.0" class="node" text-anchor="middle">Clustering</text>
<text x="135.0" y="289.0" class="small" text-anchor="middle">regrouper les points</text>
<line x1="410.0" y1="145.0" x2="375.0" y2="230.0" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="285.0" y="230.0" width="180.0" height="88.0" rx="10.0" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="375.0" y="266.0" class="node" text-anchor="middle">Réduction de dimension</text>
<text x="375.0" y="289.0" class="small" text-anchor="middle">résumer les variables</text>
<line x1="410.0" y1="145.0" x2="645.0" y2="230.0" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="555.0" y="230.0" width="180.0" height="88.0" rx="10.0" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
<text x="645.0" y="266.0" class="node" text-anchor="middle">Anomalies</text>
<text x="645.0" y="289.0" class="small" text-anchor="middle">trouver l'inhabituel</text>
</svg>
